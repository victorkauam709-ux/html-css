<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Formulário</title>
    <style>
        input {
            cursor: pointer;
        }
        
    </style>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro.php" method="POST">
        <p>
            <label for="icor">Cor</label>
            <input type="color" name="Color" id="icor" value="#00ff00">
        </p>

        <p>
            
            <label for="inivel">Satisfação</label>
                <input type="range" name="nivel" id="inivel" min="0" max="10" value="3">
        </p>

        <p>
            <label for="ifoto">Foto do perfil</label>
            <input type="file" name="Foto" id="ifoto">   
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

    </form>
</body>
</html>
